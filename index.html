<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player - Bạc Phận</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .music-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 450px;
            transition: transform 0.3s ease;
        }

        .music-card:hover {
            transform: translateY(-5px);
        }

        .listener-count {
            display: flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 16px;
            border-radius: 50px;
            width: fit-content;
            margin-bottom: 25px;
            font-size: 14px;
            font-weight: 500;
        }

        .listener-count::before {
            content: "👂";
            font-size: 16px;
        }

        .song-info {
            text-align: center;
            margin-bottom: 30px;
        }

        .song-name {
            font-size: 28px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .song-artist {
            color: #667eea;
            font-size: 16px;
            font-weight: 500;
        }

        .album-art {
            width: 200px;
            height: 200px;
            margin: 0 auto 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .album-art span {
            font-size: 80px;
        }

        .progress-section {
            margin-bottom: 25px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            cursor: pointer;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 3px;
            width: 0%;
            transition: width 0.1s linear;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 12px;
            color: #666;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
        }

        .control-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 10px;
            border-radius: 50%;
            transition: all 0.3s ease;
            color: #333;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn:hover {
            background: rgba(102, 126, 234, 0.1);
            transform: scale(1.1);
        }

        .control-btn:active {
            transform: scale(0.95);
        }

        .play-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .play-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.5);
        }

        .settings {
            border-top: 1px solid #e0e0e0;
            padding-top: 20px;
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .setting-label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #555;
            font-size: 14px;
            font-weight: 500;
        }

        .volume-control, .speed-control {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        input[type="range"] {
            width: 150px;
            height: 4px;
            -webkit-appearance: none;
            background: #e0e0e0;
            border-radius: 2px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: #667eea;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .volume-value, .speed-value {
            min-width: 45px;
            font-size: 13px;
            color: #667eea;
            font-weight: 500;
        }

        .speed-buttons {
            display: flex;
            gap: 8px;
        }

        .speed-btn {
            background: #f0f0f0;
            border: none;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            color: #666;
            transition: all 0.3s ease;
        }

        .speed-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .speed-btn:hover:not(.active) {
            background: #e0e0e0;
        }

        .update-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            width: 100%;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .update-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .update-btn:active {
            transform: translateY(0);
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .playing {
            animation: pulse 2s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div class="music-card">
        <div class="listener-count" id="listenerCount">
            222 người đang nghe
        </div>
        
        <div class="album-art">
            <span>🎵</span>
        </div>
        
        <div class="song-info">
            <div class="song-name">Bạc Phận</div>
            <div class="song-artist">Jack - K-ICM</div>
        </div>
        
        <div class="progress-section">
            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="time-info">
                <span id="currentTime">0:00</span>
                <span id="duration">0:00</span>
            </div>
        </div>
        
        <div class="controls">
            <button class="control-btn" id="prevBtn" title="Bài trước">⏮</button>
            <button class="control-btn play-btn" id="playPauseBtn">▶</button>
            <button class="control-btn" id="nextBtn" title="Bài tiếp">⏭</button>
        </div>
        
        <div class="settings">
            <div class="setting-item">
                <div class="setting-label">
                    <span>🔊</span>
                    <span>Âm lượng:</span>
                </div>
                <div class="volume-control">
                    <input type="range" id="volumeSlider" min="0" max="100" value="80">
                    <span class="volume-value" id="volumeValue">80%</span>
                </div>
            </div>
            
            <div class="setting-item">
                <div class="setting-label">
                    <span>⚡</span>
                    <span>Tốc độ:</span>
                </div>
                <div class="speed-control">
                    <div class="speed-buttons">
                        <button class="speed-btn" data-speed="0.75">0.75x</button>
                        <button class="speed-btn active" data-speed="1.0">1.0x</button>
                        <button class="speed-btn" data-speed="1.25">1.25x</button>
                        <button class="speed-btn" data-speed="1.5">1.5x</button>
                        <button class="speed-btn" data-speed="2.0">2.0x</button>
                    </div>
                </div>
            </div>
            
            <button class="update-btn" id="updateBtn">
                🔄 Kiểm tra cập nhật
            </button>
        </div>
    </div>

    <audio id="audioPlayer" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

    <script>
        // Playlist mẫu (có thể thay bằng link nhạc thực tế)
        const playlist = [
            {
                name: "Bạc Phận",
                artist: "Jack - K-ICM",
                url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"
            },
            {
                name: "Sóng Gió",
                artist: "Jack - K-ICM",
                url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"
            },
            {
                name: "Hoa Hải Đường",
                artist: "Jack",
                url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"
            }
        ];
        
        let currentSongIndex = 0;
        let isPlaying = false;
        let listenerCount = 222;
        
        const audio = document.getElementById('audioPlayer');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const volumeSlider = document.getElementById('volumeSlider');
        const volumeValue = document.getElementById('volumeValue');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const currentTimeSpan = document.getElementById('currentTime');
        const durationSpan = document.getElementById('duration');
        const updateBtn = document.getElementById('updateBtn');
        const listenerCountDiv = document.getElementById('listenerCount');
        const songNameSpan = document.querySelector('.song-name');
        const songArtistSpan = document.querySelector('.song-artist');
        
        // Tải bài hát
        function loadSong(index) {
            const song = playlist[index];
            songNameSpan.textContent = song.name;
            songArtistSpan.textContent = song.artist;
            audio.src = song.url;
            audio.load();
            
            // Reset UI
            if (isPlaying) {
                audio.play().catch(e => console.log('Auto-play bị chặn'));
            }
            updatePlayPauseButton();
        }
        
        // Cập nhật nút play/pause
        function updatePlayPauseButton() {
            if (isPlaying) {
                playPauseBtn.textContent = '⏸';
                playPauseBtn.classList.add('playing');
            } else {
                playPauseBtn.textContent = '▶';
                playPauseBtn.classList.remove('playing');
            }
        }
        
        // Play/Pause
        function togglePlayPause() {
            if (isPlaying) {
                audio.pause();
            } else {
                audio.play().catch(e => {
                    console.log('Không thể phát nhạc');
                    isPlaying = false;
                    updatePlayPauseButton();
                });
            }
            isPlaying = !isPlaying;
            updatePlayPauseButton();
        }
        
        // Bài tiếp theo
        function nextSong() {
            currentSongIndex = (currentSongIndex + 1) % playlist.length;
            loadSong(currentSongIndex);
            if (isPlaying) {
                audio.play().catch(e => console.log('Lỗi phát nhạc'));
            }
        }
        
        // Bài trước
        function prevSong() {
            currentSongIndex = (currentSongIndex - 1 + playlist.length) % playlist.length;
            loadSong(currentSongIndex);
            if (isPlaying) {
                audio.play().catch(e => console.log('Lỗi phát nhạc'));
            }
        }
        
        // Cập nhật tiến độ
        function updateProgress() {
            if (audio.duration) {
                const progress = (audio.currentTime / audio.duration) * 100;
                progressFill.style.width = `${progress}%`;
                
                // Cập nhật thời gian
                currentTimeSpan.textContent = formatTime(audio.currentTime);
                durationSpan.textContent = formatTime(audio.duration);
            }
        }
        
        // Format thời gian
        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }
        
        // Seek
        function setProgress(e) {
            const rect = progressBar.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            if (audio.duration) {
                audio.currentTime = percent * audio.duration;
            }
        }
        
        // Thay đổi âm lượng
        function setVolume() {
            const volume = volumeSlider.value / 100;
            audio.volume = volume;
            volumeValue.textContent = `${volumeSlider.value}%`;
        }
        
        // Thay đổi tốc độ
        function setSpeed(speed) {
            audio.playbackRate = parseFloat(speed);
            
            // Cập nhật active button
            document.querySelectorAll('.speed-btn').forEach(btn => {
                if (btn.dataset.speed === speed) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }
        
        // Random số người nghe
        function updateListenerCount() {
            const change = Math.floor(Math.random() * 21) - 10; // -10 đến +10
            let newCount = listenerCount + change;
            newCount = Math.max(50, Math.min(500, newCount)); // Giới hạn 50-500
            listenerCount = newCount;
            listenerCountDiv.textContent = `${listenerCount} người đang nghe`;
            
            // Hiệu ứng nhấp nháy
            listenerCountDiv.style.transform = 'scale(1.05)';
            setTimeout(() => {
                listenerCountDiv.style.transform = 'scale(1)';
            }, 200);
        }
        
        // Kiểm tra cập nhật (mô phỏng)
        function checkUpdate() {
            updateBtn.textContent = '🔄 Đang kiểm tra...';
            updateBtn.disabled = true;
            
            setTimeout(() => {
                updateBtn.textContent = '✅ Đã cập nhật!';
                updateListenerCount();
                
                setTimeout(() => {
                    updateBtn.textContent = '🔄 Kiểm tra cập nhật';
                    updateBtn.disabled = false;
                }, 2000);
            }, 1500);
        }
        
        // Event listeners
        playPauseBtn.addEventListener('click', togglePlayPause);
        prevBtn.addEventListener('click', prevSong);
        nextBtn.addEventListener('click', nextSong);
        volumeSlider.addEventListener('input', setVolume);
        progressBar.addEventListener('click', setProgress);
        updateBtn.addEventListener('click', checkUpdate);
        
        audio.addEventListener('timeupdate', updateProgress);
        audio.addEventListener('ended', nextSong);
        audio.addEventListener('loadedmetadata', () => {
            durationSpan.textContent = formatTime(audio.duration);
            if (isPlaying) {
                audio.play().catch(e => console.log('Lỗi phát'));
            }
        });
        
        // Speed buttons
        document.querySelectorAll('.speed-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const speed = e.target.dataset.speed;
                setSpeed(speed);
            });
        });
        
        // Khởi tạo
        loadSong(0);
        setVolume();
        
        // Tự động cập nhật số người nghe mỗi 10 giây
        setInterval(updateListenerCount, 10000);
        
        // Hiển thị thông báo khi sẵn sàng
        console.log('Music Player đã sẵn sàng!');
    </script>
</body>
</html>
